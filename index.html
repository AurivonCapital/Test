<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurivon Capital | The Trading Suite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">

    <style>
        /* This section MUST be between <style> tags to stay invisible */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0e17;
            color: white;
            overflow-x: hidden;
        }

        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Ensure your image file is named exactly office-background.png in GitHub */
            background-image: linear-gradient(rgba(10, 14, 18, 0.85), rgba(10, 14, 18, 0.85)), 
                              url('office-background.png'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .gold-gradient {
            background: linear-gradient(to bottom, #ffffff 20%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .btn-glow {
            background: linear-gradient(90deg, #1e40af, #3b82f6);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
        }
        
        .btn-glow:hover {
            box-shadow: 0 0 35px rgba(59, 130, 246, 0.7);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <nav class="p-6 bg-black/60 backdrop-blur-lg flex justify-between items-center sticky top-0 z-50">
        <div class="text-2xl font-black italic tracking-tighter">
            AURIVON <span class="text-blue-500">CAPITAL</span>
        </div>
        <div class="hidden md:flex space-x-8 text-xs font-bold uppercase tracking-widest">
            <a href="index.html" class="text-blue-400">Home</a>
            <a href="course.html" class="hover:text-blue-400 transition">Course</a>
            <a href="recruitment.html" class="hover:text-blue-400 transition">Recruitment</a>
            <a href="contact.html" class="hover:text-blue-400 transition">Contact</a>
        </div>
    </nav>

    <main class="min-h-screen flex flex-col items-center justify-center px-6 text-center">
        <h2 class="text-yellow-500 font-bold uppercase tracking-[0.3em] text-sm mb-4">Aurivon Capital Presents</h2>
        <h1 class="gold-gradient text-6xl md:text-8xl uppercase mb-6 leading-tight">The Trading Suite</h1>
        <p class="text-xl md:text-2xl text-slate-300 max-w-3xl font-light mb-12">
            Singapore’s premier co-working ecosystem engineered for Proprietary Traders and Market Professionals.
        </p>

        <a href="contact.html" class="btn-glow inline-block px-12 py-5 rounded-full text-lg font-black uppercase tracking-widest italic">
            Join the Waitlist
        </a>
    </main>

</body>
</html>
